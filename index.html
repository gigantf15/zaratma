<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geliştirilmiş 7'li Zar Oyunu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 50px;
        }
        #dice-container {
            margin-top: 20px;
            display: inline-block;
            position: relative;
            min-height: 220px; /* Yer kaplamaması için min-height */
        }
        #dice-gif, #final-dice-7 {
            width: 200px; /* Zarın boyutu */
            height: auto;
            border-radius: 15px; /* Hafif yuvarlatma */
        }
        /* Başlangıçta gizli */
        #dice-gif, #final-dice-7 {
            display: none;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        #result-text {
            font-size: 32px;
            font-weight: bold;
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>Basit Zar Atma Oyunu</h1>
    <p>"Normal" bir zar atın ve sürprizi sadece bittiğinde görün!</p>

    <div id="dice-container">
        <!-- Atış esnasında dönen GIF, 7'yi göstermez -->
        <img id="dice-gif" src="zar_animasyonu_revize.gif" alt="Zar Atılıyor...">
        <!-- Atış bittikten sonra gösterilen durağan 7 resmi -->
        <img id="final-dice-7" src="sonuc_7.png" alt="Hileli 7!">
    </div>

    <br>
    <button onclick="rollDice()">Zar At</button>

    <p id="result-text"></p>

    <script>
        function rollDice() {
            var diceImg = document.getElementById('dice-gif');
            var finalDiceImg = document.getElementById('final-dice-7');
            var resultText = document.getElementById('result-text');
            var button = document.querySelector('button');

            // 1. Düğmeyi devre dışı bırak
            button.disabled = true;
            button.innerText = "Atılıyor...";
            
            // 2. Mevcut sonuçları gizle ve GIF'i göster
            resultText.innerText = "";
            finalDiceImg.style.display = "none";
            diceImg.style.display = "block";

            // 3. GIF animasyonunun süresine göre (yaklaşık 4 saniye)
            // sonucu göster ve durağan 7 resmini aç
            setTimeout(function() {
                // GIF'i gizle, durağan 7'yi göster
                diceImg.style.display = "none";
                finalDiceImg.style.display = "block";
                
                // Metni yaz
                resultText.innerText = "Sonuç: 7!";
                
                // Düğmeyi aktif et
                button.disabled = false;
                button.innerText = "Zar At";
            }, 4000); // GIF süresi 4 saniye
        }
    </script>

</body>
</html>
