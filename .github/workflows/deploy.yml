name: Hızlı Deploy
on:
  push:
    branches: ["main"] # Eğer ana dalınız master ise burayı master yapın

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4
      - name: GitHub Pages Ayarla
        uses: actions/configure-pages@v5
      - name: Dosyaları Yükle (Jekyll olmadan)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Yayına Al
        id: deployment
        uses: actions/deploy-pages@v4